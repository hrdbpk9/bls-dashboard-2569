<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard อบรมฟื้นฟู BLS 2569</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FAF6EE;
    --paper:#FFFFFF;
    --ink:#1F2A28;
    --ink-soft:#5C6A66;
    --mint-900:#0F6B5C;
    --mint-700:#15806E;
    --mint-100:#E3F1EC;
    --mint-50:#F2F8F5;
    --amber:#E8743B;
    --amber-100:#FCE7DA;
    --red:#C84B3C;
    --red-100:#F8E2DE;
    --line:#E4DFD2;
    --shadow: 0 1px 2px rgba(31,42,40,0.04), 0 4px 16px rgba(31,42,40,0.05);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Sarabun',sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:32px 24px 80px;
  }

  /* ---------- Header ---------- */
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:20px;
    margin-bottom:28px;
    border-bottom:1px solid var(--line);
    padding-bottom:24px;
  }
  .title-block .eyebrow{
    font-size:13px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--mint-700);
    font-weight:600;
    margin-bottom:6px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(28px,4vw,40px);
    margin:0;
    line-height:1.15;
    color:var(--ink);
  }
  h1 em{
    font-style:normal;
    color:var(--mint-900);
  }
  .subtitle{
    color:var(--ink-soft);
    font-size:15px;
    margin-top:6px;
  }

  .status-pill{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:100px;
    padding:9px 16px;
    font-size:13.5px;
    color:var(--ink-soft);
    box-shadow:var(--shadow);
    white-space:nowrap;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--mint-700);
    flex-shrink:0;
  }
  .dot.live{ animation:pulse 2s infinite; }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(21,128,110,0.5); }
    70%{ box-shadow:0 0 0 6px rgba(21,128,110,0); }
    100%{ box-shadow:0 0 0 0 rgba(21,128,110,0); }
  }
  #refreshBtn{
    border:none;background:none;color:var(--mint-700);
    font-weight:600;cursor:pointer;font-size:13.5px;
    font-family:inherit;padding:0;text-decoration:underline;
    text-decoration-color:transparent;
    transition:text-decoration-color .15s;
  }
  #refreshBtn:hover{ text-decoration-color:var(--mint-700); }

  /* ---------- KPI row ---------- */
  .kpi-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    margin-bottom:36px;
  }
  .kpi{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px 22px;
    box-shadow:var(--shadow);
  }
  .kpi .num{
    font-family:'Fraunces',serif;
    font-size:34px;
    font-weight:600;
    color:var(--ink);
    line-height:1;
  }
  .kpi .num.accent{ color:var(--mint-900); }
  .kpi .num.warn{ color:var(--amber); }
  .kpi .lbl{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:6px;
  }

  /* ---------- Section heads ---------- */
  .section-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:16px;
    gap:12px;
    flex-wrap:wrap;
  }
  .section-head h2{
    font-family:'Fraunces',serif;
    font-size:22px;
    font-weight:600;
    margin:0;
  }
  .section-head .hint{
    font-size:13px;
    color:var(--ink-soft);
  }

  section{ margin-bottom:44px; }

  /* ---------- Slot cards (training rounds) ---------- */
  .slot-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:14px;
  }
  .slot-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 20px 20px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
  }
  .slot-card .date{
    font-weight:600;
    font-size:15.5px;
    color:var(--ink);
  }
  .slot-card .timeslot{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:2px;
    margin-bottom:14px;
  }
  .capacity-row{
    display:flex;
    align-items:baseline;
    gap:6px;
    margin-bottom:8px;
  }
  .capacity-row .filled{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
  }
  .capacity-row .of-total{
    font-size:14px;
    color:var(--ink-soft);
  }
  .bar-track{
    height:8px;
    border-radius:6px;
    background:var(--mint-50);
    overflow:hidden;
    margin-bottom:10px;
  }
  .bar-fill{
    height:100%;
    border-radius:6px;
    background:var(--mint-700);
    transition:width .5s ease;
  }
  .bar-fill.warn{ background:var(--amber); }
  .bar-fill.full{ background:var(--red); }
  .seats-left{
    font-size:13px;
    font-weight:600;
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:3px 10px;
    border-radius:100px;
  }
  .seats-left.ok{ background:var(--mint-100); color:var(--mint-900); }
  .seats-left.warn{ background:var(--amber-100); color:var(--amber); }
  .seats-left.full{ background:var(--red-100); color:var(--red); }

  /* ---------- Dept table ---------- */
  .dept-wrap{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  table{ width:100%; border-collapse:collapse; }
  thead th{
    text-align:left;
    font-size:12.5px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    font-weight:600;
    padding:14px 20px;
    border-bottom:1px solid var(--line);
    background:var(--mint-50);
  }
  thead th.num-col{ text-align:right; }
  tbody td{
    padding:13px 20px;
    border-bottom:1px solid var(--line);
    font-size:14.5px;
  }
  tbody tr:last-child td{ border-bottom:none; }
  tbody td.num-col{ text-align:right; font-weight:600; color:var(--mint-900); font-family:'Fraunces',serif; font-size:16px;}
  tbody tr:hover{ background:var(--mint-50); }
  .dept-bar-cell{ display:flex; align-items:center; gap:10px; }
  .dept-bar-track{
    flex:1; height:6px; border-radius:4px; background:var(--mint-50); overflow:hidden; min-width:60px;
  }
  .dept-bar-fill{ height:100%; background:var(--mint-700); border-radius:4px; }

  /* ---------- Loading / error ---------- */
  .state-box{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-size:15px;
  }
  .spinner{
    width:28px;height:28px;
    border:3px solid var(--mint-100);
    border-top-color:var(--mint-700);
    border-radius:50%;
    margin:0 auto 14px;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .error-box{
    background:var(--red-100); color:var(--red);
    border-radius:14px; padding:18px 22px; font-size:14px;
    line-height:1.6;
  }
  .error-box code{
    background:rgba(255,255,255,0.5);
    padding:2px 6px; border-radius:4px; font-size:12.5px;
  }

  footer{
    text-align:center;
    color:var(--ink-soft);
    font-size:12.5px;
    margin-top:20px;
  }

  @media (max-width:760px){
    .kpi-row{ grid-template-columns:repeat(2,1fr); }
    header{ align-items:flex-start; }
  }
  @media (max-width:480px){
    .kpi-row{ grid-template-columns:1fr 1fr; }
    .wrap{ padding:20px 16px 60px; }
  }

  @media (prefers-reduced-motion: reduce){
    .dot.live{ animation:none; }
    .spinner{ animation:none; border-top-color:var(--mint-700); }
    .bar-fill, .dept-bar-fill{ transition:none; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="title-block">
      <div class="eyebrow">การอบรมฟื้นฟูความรู้ &middot; ประจำปี 2569</div>
      <h1>Basic Life <em>Support</em> Dashboard</h1>
      <div class="subtitle">สรุปยอดลงทะเบียนแบบเรียลไทม์ จาก Google Sheet ของฟอร์มลงทะเบียน</div>
    </div>
    <div class="status-pill">
      <span class="dot live" id="statusDot"></span>
      <span id="statusText">กำลังเชื่อมต่อ…</span>
      <button id="refreshBtn" onclick="loadData()">รีเฟรชตอนนี้</button>
    </div>
  </header>

  <div id="loadingState" class="state-box">
    <div class="spinner"></div>
    กำลังดึงข้อมูลจาก Google Sheet…
  </div>

  <div id="errorState" style="display:none;" class="error-box"></div>

  <div id="dashboardContent" style="display:none;">

    <div class="kpi-row" id="kpiRow"></div>

    <section>
      <div class="section-head">
        <h2>ยอดลงทะเบียนแต่ละรอบ</h2>
        <div class="hint">ความจุรอบละ 60 ที่นั่ง</div>
      </div>
      <div class="slot-grid" id="slotGrid"></div>
    </section>

    <section>
      <div class="section-head">
        <h2>จำนวนพนักงานตามแผนก/หน่วยงาน</h2>
        <div class="hint" id="deptCount"></div>
      </div>
      <div class="dept-wrap">
        <table>
          <thead>
            <tr>
              <th>แผนก / หน่วยงาน</th>
              <th class="num-col" style="width:120px;">ลงทะเบียน</th>
              <th style="width:200px;">สัดส่วน</th>
            </tr>
          </thead>
          <tbody id="deptTableBody"></tbody>
        </table>
      </div>
    </section>

  </div>

  <footer id="lastUpdated"></footer>

</div>

<script>
const SHEET_ID = "1Bzx9rTcqcIvOO9bBDJCy3rtda0fANwv1088cBxI-YbU";
const GID = "913510215";
const CAPACITY_PER_SLOT = 60;
const REFRESH_INTERVAL_MS = 30000;

const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

function parseGvizResponse(text) {
  const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
  return JSON.parse(jsonStr);
}

function thaiDateSortKey(label) {
  // label like "1 กรกฎาคม 2569: รอบเช้า (9.00-11.00 น.)"
  const dayMatch = label.match(/^(\d+)/);
  const day = dayMatch ? parseInt(dayMatch[1], 10) : 0;
  const isMorning = label.includes('เช้า');
  return day * 10 + (isMorning ? 0 : 1);
}

async function loadData() {
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const loadingState = document.getElementById('loadingState');
  const errorState = document.getElementById('errorState');
  const dashboardContent = document.getElementById('dashboardContent');

  statusText.textContent = "กำลังอัพเดท…";

  try {
    const res = await fetch(GVIZ_URL, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const data = parseGvizResponse(text);

    if (!data.table || !data.table.rows) {
      throw new Error("ไม่พบข้อมูลตารางใน Sheet");
    }

    const cols = data.table.cols.map(c => (c.label || '').trim());
    // Expect columns: ประทับเวลา, รหัสพนักงาน, ชื่อ-นามสกุล, ตำแหน่ง, แผนก/หน่วยงาน, เบอร์โทร, วันและเวลาที่ต้องการเข้าอบรม
    const idxDept = cols.findIndex(c => c.includes('แผนก'));
    const idxSlot = cols.findIndex(c => c.includes('วันและเวลา'));
    const idxName = cols.findIndex(c => c.includes('ชื่อ'));

    const rows = data.table.rows
      .map(r => r.c)
      .filter(c => c && c.some(cell => cell && cell.v !== null && cell.v !== ''));

    const slotCounts = {};
    const deptCounts = {};
    let totalRegistrations = 0;

    rows.forEach(cells => {
      const slotCell = idxSlot >= 0 ? cells[idxSlot] : null;
      const deptCell = idxDept >= 0 ? cells[idxDept] : null;
      const nameCell = idxName >= 0 ? cells[idxName] : null;

      const slotVal = slotCell && slotCell.v != null ? String(slotCell.v).trim() : null;
      const deptVal = deptCell && deptCell.v != null ? String(deptCell.v).trim() : null;
      const hasName = nameCell && nameCell.v != null && String(nameCell.v).trim() !== '';

      if (!hasName) return; // skip blank/incomplete rows

      totalRegistrations++;

      if (slotVal) {
        slotCounts[slotVal] = (slotCounts[slotVal] || 0) + 1;
      }
      if (deptVal) {
        deptCounts[deptVal] = (deptCounts[deptVal] || 0) + 1;
      }
    });

    renderDashboard(slotCounts, deptCounts, totalRegistrations);

    loadingState.style.display = 'none';
    errorState.style.display = 'none';
    dashboardContent.style.display = 'block';
    statusDot.classList.add('live');
    statusText.textContent = "เชื่อมต่อสำเร็จ — อัพเดทอัตโนมัติทุก 30 วินาที";
    document.getElementById('lastUpdated').textContent =
      "อัพเดทล่าสุด: " + new Date().toLocaleString('th-TH', { dateStyle:'medium', timeStyle:'medium' });

  } catch (err) {
    console.error(err);
    loadingState.style.display = 'none';
    dashboardContent.style.display = 'none';
    errorState.style.display = 'block';
    statusDot.classList.remove('live');
    statusText.textContent = "เชื่อมต่อไม่สำเร็จ";
    errorState.innerHTML = `
      <strong>ดึงข้อมูลจาก Google Sheet ไม่สำเร็จ</strong><br><br>
      สาเหตุที่เป็นไปได้:<br>
      • <strong>ถ้ากำลังดูหน้านี้ในหน้าพรีวิวของ Claude.ai</strong> — หน้าพรีวิวมีการจำกัด network ของตัวเอง ไม่อนุญาตให้เชื่อมต่อ Google โดยตรง วิธีแก้คือ กดปุ่ม <strong>Copy</strong> ที่มุมขวาบนของกล่องโค้ด แล้วบันทึกเป็นไฟล์ .html จากนั้นเปิดไฟล์นั้นด้วยเบราว์เซอร์จริง (ดับเบิลคลิกที่ไฟล์ หรือลากเข้า Chrome/Edge)<br>
      • Sheet ยังไม่ได้เปิดสิทธิ์ "ทุกคนที่มีลิงก์สามารถดูได้" — ตรวจสอบที่ปุ่ม Share บน Google Sheet<br>
      • แท็บ/หน้า (gid) ที่ระบุไว้ในโค้ดอาจไม่ตรงกับแท็บคำตอบฟอร์ม<br><br>
      รายละเอียด: <code>${err.message}</code>
    `;
  }
}

function renderDashboard(slotCounts, deptCounts, totalRegistrations) {
  // ---- KPI row ----
  const slotKeys = Object.keys(slotCounts);
  const totalSlots = slotKeys.length;
  const totalCapacity = totalSlots * CAPACITY_PER_SLOT;
  const totalSeatsLeft = Math.max(totalCapacity - totalRegistrations, 0);
  const fullSlots = slotKeys.filter(k => slotCounts[k] >= CAPACITY_PER_SLOT).length;
  const totalDepts = Object.keys(deptCounts).length;

  const kpiRow = document.getElementById('kpiRow');
  kpiRow.innerHTML = `
    <div class="kpi">
      <div class="num accent">${totalRegistrations.toLocaleString('th-TH')}</div>
      <div class="lbl">ผู้ลงทะเบียนทั้งหมด</div>
    </div>
    <div class="kpi">
      <div class="num">${totalSlots}</div>
      <div class="lbl">รอบอบรมที่เปิดรับ</div>
    </div>
    <div class="kpi">
      <div class="num ${totalSeatsLeft < totalCapacity * 0.15 ? 'warn' : ''}">${totalSeatsLeft.toLocaleString('th-TH')}</div>
      <div class="lbl">ที่นั่งว่างรวม (จาก ${totalCapacity.toLocaleString('th-TH')})</div>
    </div>
    <div class="kpi">
      <div class="num">${totalDepts}</div>
      <div class="lbl">แผนก/หน่วยงานที่ลงทะเบียน</div>
    </div>
  `;

  // ---- Slot cards ----
  const sortedSlots = slotKeys.sort((a, b) => thaiDateSortKey(a) - thaiDateSortKey(b));
  const slotGrid = document.getElementById('slotGrid');
  slotGrid.innerHTML = sortedSlots.map(slot => {
    const count = slotCounts[slot];
    const seatsLeft = Math.max(CAPACITY_PER_SLOT - count, 0);
    const pct = Math.min((count / CAPACITY_PER_SLOT) * 100, 100);

    let barClass = '';
    let pillClass = 'ok';
    let pillText = `เหลือ ${seatsLeft} ที่`;
    if (count >= CAPACITY_PER_SLOT) {
      barClass = 'full'; pillClass = 'full'; pillText = 'เต็มแล้ว';
    } else if (pct >= 80) {
      barClass = 'warn'; pillClass = 'warn';
    }

    const splitIdx = slot.indexOf(':');
    const datePart = splitIdx > -1 ? slot.substring(0, splitIdx).trim() : slot;
    const timePart = splitIdx > -1 ? slot.substring(splitIdx + 1).trim() : '';

    return `
      <div class="slot-card">
        <div class="date">${datePart}</div>
        <div class="timeslot">${timePart}</div>
        <div class="capacity-row">
          <span class="filled">${count}</span>
          <span class="of-total">/ ${CAPACITY_PER_SLOT} คน</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill ${barClass}" style="width:${pct}%;"></div>
        </div>
        <span class="seats-left ${pillClass}">${pillText}</span>
      </div>
    `;
  }).join('');

  // ---- Department table ----
  const sortedDepts = Object.entries(deptCounts).sort((a, b) => b[1] - a[1]);
  const maxDeptCount = sortedDepts.length ? sortedDepts[0][1] : 1;
  document.getElementById('deptCount').textContent = `${sortedDepts.length} แผนก/หน่วยงาน`;

  const deptTableBody = document.getElementById('deptTableBody');
  deptTableBody.innerHTML = sortedDepts.map(([dept, count]) => {
    const pct = (count / maxDeptCount) * 100;
    return `
      <tr>
        <td>${dept}</td>
        <td class="num-col">${count}</td>
        <td>
          <div class="dept-bar-cell">
            <div class="dept-bar-track">
              <div class="dept-bar-fill" style="width:${pct}%;"></div>
            </div>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

loadData();
setInterval(loadData, REFRESH_INTERVAL_MS);
</script>

</body>
</html>
